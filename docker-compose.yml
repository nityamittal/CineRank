version: "3.8"

services:
  # ── Infrastructure ──────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: cinerank-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: cinerank-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: cinerank-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis-data:/data

  postgres:
    image: postgres:16-alpine
    container_name: cinerank-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-recdb}
      POSTGRES_USER: ${POSTGRES_USER:-recuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-recpass}
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-recuser} -d ${POSTGRES_DB:-recdb}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Application Services ────────────────────────────────────────

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: cinerank-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: |
      "
      kafka-topics --create --if-not-exists --topic user_events --bootstrap-server kafka:29092 --partitions 3 --replication-factor 1
      kafka-topics --create --if-not-exists --topic processed_features --bootstrap-server kafka:29092 --partitions 3 --replication-factor 1
      echo 'Topics created successfully.'
      "
    restart: "no"

  producer:
    build:
      context: ./kafka_producer
    container_name: cinerank-producer
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      DATA_PATH: /data/ml-32m/ratings.csv
    volumes:
      - ./ml-32m:/data/ml-32m:ro
    restart: on-failure

  processor:
    build:
      context: ./stream_processor
    container_name: cinerank-processor
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC: user_events
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MOVIES_PATH: /data/ml-32m/movies.csv
    volumes:
      - ./ml-32m:/data/ml-32m:ro
    restart: on-failure

  recommendation-engine:
    build:
      context: ./recommendation_engine
    container_name: cinerank-rec-engine
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-recdb}
      POSTGRES_USER: ${POSTGRES_USER:-recuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-recpass}
    volumes:
      - model-data:/app/models
      - ./ml-32m:/data/ml-32m:ro
    command: ["python", "train_model.py", "--csv-path", "/data/ml-32m/ratings.csv", "--movies-path", "/data/ml-32m/movies.csv", "--output-dir", "/app/models", "--max-ratings", "1000000"]
    restart: "no"

  api:
    build:
      context: ./api
    container_name: cinerank-api
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-recdb}
      POSTGRES_USER: ${POSTGRES_USER:-recuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-recpass}
      MODEL_DIR: /app/models
    volumes:
      - model-data:/app/models
      - ./recommendation_engine:/app/recommendation_engine:ro
    restart: on-failure

volumes:
  redis-data:
  postgres-data:
  model-data:
